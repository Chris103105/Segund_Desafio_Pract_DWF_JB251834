

# Aquí le decimos dónde guardar los datos.
# Usar 'mem' significa que la base de datos tiene "amnesia": vive en la memoria RAM y se borra al apagar el programa.
spring.datasource.url=jdbc:h2:mem:schooldb

# spring.datasource.url=jdbc:h2:file:./schooldb

# Este es el "traductor" interno que sabe cómo comunicarse específicamente con una base de datos H2.
spring.datasource.driverClassName=org.h2.Driver

# El usuario por defecto (sa = System Administrator) y su contraseńa en blanco para poder entrar.
spring.datasource.username=sa
spring.datasource.password=


# Encendemos la interfaz gráfica para poder ver nuestras tablas directamente desde el navegador web.
spring.h2.console.enabled=true

# Le decimos al sistema que la dirección para entrar a ver esa interfaz será localhost:8080/h2-console
spring.h2.console.path=/h2-console



# Le ordenamos a Spring que siempre ejecute nuestros archivos "schema.sql" y "data.sql" apenas arranque el programa.
spring.sql.init.mode=always

# Le decimos a Hibernate: "ˇManos quietas!". Le prohibimos inventar o crear tablas mágicamente por su cuenta,
# porque nosotros ya construimos nuestra propia estructura exacta en el archivo schema.sql.
spring.jpa.hibernate.ddl-auto=none

# Le pedimos al sistema que sea paciente y espere a que nuestras tablas (del schema.sql) estén completamente armadas
# antes de intentar meterles datos o conectar las clases de Java.
spring.jpa.defer-datasource-initialization=true